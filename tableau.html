<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>exemple de tableau complexe</title>
</head>
<body>
    <table border="1">
<caption>exemple de tableau avec structure complete</caption>
        <thead>
            <tr>
                <th>Nom</th>
                <th>Age</th>
                <th>Ville</th>
            </tr>
        </thead>
        <tbody>
            <tr>
                <td>Jean</td>
                <td>25</td>
                <td>Paris</td>
            </tr>
            <tr>
                <td>marie</td>
                <td>30</td>
                <td>Lyon</td>
            </tr>
            <tr>
                <td>Paule</td>
                <td>22</td>
                <td>Marseille</td>
            </tr>
        </tbody>
        <tfoot>
            <tr>
                <td colspan="2"> Nombre total de personnes</td>
                <td>3</td>
            </tr>
        </tfoot>
    </table>
        

    
</body>
</html>
